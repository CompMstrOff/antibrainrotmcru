# ==========================================
#   Anti-Brainrot — конфигурация плагина
# ==========================================

# Список запрещённых слов/фраз (регистр не важен,
# пробелы/точки/дефисы/подчёркивания внутри фразы тоже игнорируются,
# так что "6-7", "6.7", "с и к с   с е в е н" тоже поймаются).
blocked-words:
  - "сикс севен"
  - "67"
  - "six seven"

# Сообщение при обнаружении нарушения.
# {player} будет заменено на имя игрока.
broadcast-message: "[Anti-Brainrot💀] Лол! Игрок {player} страдает брэинротом."

# true  - сообщение увидят все игроки на сервере
# false - сообщение увидит только сам нарушитель
broadcast-to-all: true

# Писать ли информацию о нарушении в консоль сервера
log-to-console: true
